<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div tag</title>
</head>
<body>
    <!--block level element-->
    <div>Hello</div>
    <div>Hi</div>
     
    <!--inline level element-->
    <span>how are you?</span>
    <span>Are you doing well?</span>

    <p>I have a very good <span style="color:red;">Knowledge</span></p>
</body>
</html>
